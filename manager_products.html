<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Sản phẩm</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <h2 class="logo">OPERATIONAL UI</h2>
            <nav class="main-nav">
                <a href="manager_dashboard.html" class="nav-item">📋 Quản lý Đơn hàng</a>
                <a href="manager_products.html" class="nav-item active">📦 Quản lý Sản phẩm</a>
                <a href="manager_users.html" class="nav-item">👤 Quản lý Nhân viên</a>
            </nav>
            <a href="login.html" class="logout-link">🔓 Đăng xuất</a>
        </aside>
        
        <main class="content">
            <header class="content-header">
                <h1>Quản lý Sản phẩm</h1>
                <button id="add-product-btn" class="btn btn-primary">➕ Thêm Sản phẩm</button>
            </header>
            
            <div id="product-form-container" class="form-card" style="display:none;">
                <h3>Thêm/Sửa Sản phẩm</h3>
                <form id="product-form">
                    <input type="hidden" id="product-id" name="id">
                    <div class="form-group">
                        <label for="product-name">Tên Sản phẩm:</label>
                        <input type="text" id="product-name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="product-price">Giá (VND):</label>
                        <input type="number" id="product-price" name="price" required>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-success">Lưu</button>
                        <button type="button" class="btn btn-secondary btn-cancel">Hủy</button>
                    </div>
                </form>
            </div>

            <section class="data-section">
                <table class="data-table" id="product-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên Sản phẩm</th>
                            <th>Giá</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr data-id="P001">
                            <td>P001</td>
                            <td>Áo thun cơ bản</td>
                            <td>150,000</td>
                            <td>
                                <button class="btn btn-small btn-edit">Sửa</button>
                                <button class="btn btn-small btn-delete">Xóa</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>
    <script src="../js/script.js"></script>
</body>
</html>
